<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grrrid</title>

        <style>
            .btn {
                background-color: cornflowerblue;
                padding: 14px 16px;
                color: aliceblue;
                border-radius: 999px;
            }

            .grid{
                background-color: bisque;
                display: flex;
                justify-content: center;
                align-items: center;
                width: 400px;
                padding: 40px;
            }

            .lang{display: flex;justify-content: center;
                align-items: center;
               padding-bottom: 40px;}
        </style>
</head>
<body>
    <div class="grid">
        <div class="item">
            <div class="lang">
                <b>English</b>
            </div>
            <div class="button">
                <button class="btn blue">Download 32bit</button>
               
                <button class="btn green">Download 64bit</button>
            </div>

        </div>
    </div>
</body>
</html>
