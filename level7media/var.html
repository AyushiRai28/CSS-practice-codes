<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalVariable</title>

    <style>

        :root{
            --color: pink;
            --seccolor:hotpink;
        }

        ::selection{background-color: rgb(134, 249, 249);
        color: brown;}

        .box::first-letter{
            color: chocolate;
            font-size: 30px;
        }


    </style>
</head>
<body>

    <div class="box">
        now at many places we can just set 
        background-color: var(--color);
        that would change the color to pink, and easy to change in future
    
    </div>
    

</body>
</html>
